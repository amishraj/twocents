@if (ui.quickAddOpen()) {
  <div class="overlay" (click)="close()"></div>
  <div class="sheet">
    <div class="sheet-header">
      <div>
        <h3>Add expense</h3>
        <p>Track shared or personal spend instantly.</p>
      </div>
      <button type="button" class="icon-button" (click)="close()">X</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Title</label>
        <input type="text" formControlName="title" placeholder="Groceries, rent, coffee" />
      </div>

      <div class="grid">
        <div class="field">
          <label>Amount</label>
          <input type="number" formControlName="amount" min="0" step="0.01" placeholder="Enter amount" />
        </div>
        <div class="field">
          <label>Category</label>
          <div class="category-row">
            <select formControlName="categoryId" (change)="onCategorySelect($event)">
              @for (category of categories(); track category.id) {
                <option [value]="category.id">{{ category.name }}</option>
              }
              <option value="__new__">+ New category</option>
            </select>
            <button type="button" class="tiny-icon" (click)="openRenameCategory()" aria-label="Rename category">
              <svg viewBox="0 0 24 24" fill="none"><path d="m4 20 4.5-1 9-9a1.5 1.5 0 0 0 0-2.1L16.1 6.5a1.5 1.5 0 0 0-2.1 0l-9 9L4 20Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="m12.5 8.5 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label>Paid by</label>
          <select formControlName="paidByUserId">
            @if (hasHousehold()) {
              @for (member of householdMembers(); track member.userId) {
                <option [value]="member.userId">{{ member.displayName }}</option>
              }
            } @else if (activeUser()) {
              <option [value]="activeUser()?.id">{{ activeUser()?.name }}</option>
            }
          </select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" formControlName="date" />
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label>Scope</label>
          <select formControlName="scope">
            @if (hasHousehold()) {
              <option value="shared">Shared</option>
            }
            <option value="personal">Personal</option>
          </select>
          @if (!hasHousehold()) {
            <p>Shared scope unlocks after you join or create a household.</p>
          }
        </div>
        <div class="field checkbox">
          <label>
            <input type="checkbox" formControlName="recurring" />
            Recurring monthly
          </label>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="ghost" (click)="close()">Cancel</button>
        <button type="submit" class="primary">Add expense</button>
      </div>
    </form>
  </div>
}

@if (showCategoryModal()) {
  <app-category-modal
    (created)="onCategoryCreated($event)"
    (closed)="closeCategoryModal()"
  />
}

@if (showRenameCategoryModal()) {
  <div class="rename-overlay" (click)="closeRenameCategoryModal()"></div>
  <div class="rename-modal">
    <h3>Rename category</h3>
    <form [formGroup]="renameCategoryForm" (ngSubmit)="saveCategoryRename()">
      <input type="text" formControlName="name" placeholder="Category name" />
      <div class="rename-actions">
        <button type="button" class="ghost" (click)="closeRenameCategoryModal()">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
    </form>
  </div>
}
